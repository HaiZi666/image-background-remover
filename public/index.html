<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white shadow-sm py-6">
    <h1 class="text-2xl font-bold text-center text-gray-800">Image Background Remover</h1>
  </header>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto px-4 py-8 max-w-2xl">
    <!-- Upload Area -->
    <div 
      id="uploadArea"
      class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all mb-6"
    >
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" class="hidden">
      <div id="uploadPrompt">
        <div class="text-5xl mb-4">🖼️</div>
        <p class="text-gray-600 mb-2">Drag & drop an image here, or click to upload</p>
        <p class="text-sm text-gray-400">Supports JPG, PNG, WebP (max 10MB)</p>
      </div>
      <div id="previewContainer" class="hidden">
        <img id="previewImage" class="max-h-64 mx-auto rounded-lg shadow-md">
        <p id="fileName" class="mt-2 text-sm text-gray-500"></p>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-4 mb-6">
      <button 
        id="removeBgBtn"
        class="flex-1 bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-lg transition-colors"
        disabled
      >
        Remove Background
      </button>
      <button 
        id="resetBtn"
        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition-colors"
      >
        Reset
      </button>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden text-center py-8">
      <div class="inline-block animate-spin text-4xl mb-4">⏳</div>
      <p class="text-gray-600">Removing background...</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
      <p id="errorMessage" class="text-red-600 text-center"></p>
      <button id="retryBtn" class="mt-3 w-full bg-red-100 hover:bg-red-200 text-red-700 font-medium py-2 px-4 rounded transition-colors">
        Try Again
      </button>
    </div>

    <!-- Result Area -->
    <div id="resultArea" class="hidden">
      <h2 class="text-lg font-semibold text-gray-700 mb-3 text-center">Result</h2>
      <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <!-- Checkerboard background to show transparency -->
        <div class="bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2YzZjRmNiIvPjxyZWN0IHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iI2Y1ZjVmNyIvPjwvc3ZnPg==')] bg-repeat rounded-lg p-2">
          <img id="resultImage" class="max-h-80 mx-auto rounded">
        </div>
      </div>
      <button 
        id="downloadBtn"
        class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors"
      >
        ⬇️ Download Result
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-4 text-sm text-gray-400">
    Powered by <a href="https://www.remove.bg" target="_blank" class="text-blue-500 hover:underline">Remove.bg</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
